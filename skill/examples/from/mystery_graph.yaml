nodes:
- id: boy_in_white
  name: Boy in White
  type: entity
  canon_summary: A mysterious vision appearing to select individuals in the Township,
    offering guidance and safety advice. He first appeared to Victor in the 1970s
    and later to Ethan, and instructed Christopher to go through the Bottle Tree to
    free the children.
  priority: core_required
  open_questions:
  - What is the true nature/origin of the Boy in White?
  - Is he opposed to the Man in Yellow or an independent benevolent force?
  - Why does he appear only to specific people (Victor, Ethan, Christopher)?
  - What is his connection to the ritual murder of the children?
- id: man_in_yellow
  name: Man in Yellow
  type: entity
  canon_summary: An unknown malevolent entity, the main antagonist, who may control
    the Township. He can take human forms (currently posing as Sophia), manipulates
    inhabitants like Sara, and killed Jim Matthews after warning against digging the
    basement hole.
  priority: core_required
  open_questions:
  - What exactly is the Man in Yellow and does he control the Township?
  - Why does he warn against digging in the basement?
  - How can he time-travel/encounter Julie across timelines?
  - What is his connection to Sophia and other forms he takes?
- id: township
  name: The Township
  type: concept
  canon_summary: A mysterious area in the middle of the US that traps all who enter,
    marked by a Fallen Tree at its entrance and looping roads. Contains the Town,
    Colony House, Tunnels, Forest, Faraway Trees, Lighthouse, and the Dungeon.
  priority: core_required
  open_questions:
  - Where/what is the Township physically and metaphysically?
  - Who or what created it and why?
  - How does it have functioning electricity without external connections?
  - Is escape possible and how?
- id: ghoulish_children
  name: Ghoulish Children
  type: entity
  canon_summary: Visions or spirits haunting Tabitha after her time in the Caves,
    associated with the Lighthouse mysteries. They chant 'anghkooey' and appeared
    first in the cave chamber with stacked stones.
  priority: core_required
  open_questions:
  - Are the Ghoulish Children the same as the ritually murdered children Boy in White
    mentioned?
  - What does 'anghkooey' mean?
  - How does freeing them relate to escaping the Township?
  - Why do they appear specifically to Tabitha?
- id: bottle_trees
  name: Bottle Trees
  type: concept
  canon_summary: Trees adorned with glass bottles containing papers with four-digit
    numbers (possibly dates). One in the Township is a unique Farway Tree that always
    transports to the Lighthouse. Miranda Kavanaugh created similar art installations
    in Maine before becoming trapped.
  priority: core_required
  open_questions:
  - What do the four-digit numbers on the papers signify?
  - Why did Miranda create Bottle Tree installations before being trapped?
  - How does the Bottle Tree connect to the Lighthouse mystery?
  - Why was Miranda's body found at a Bottle Tree?
- id: faraway_trees
  name: Faraway Trees
  type: concept
  canon_summary: Mysterious trees with hollows that transport people to various locations
    across the Township, possibly even outside it. They may have sent Tabitha to a
    hospital in the outside world.
  priority: core_required
  open_questions:
  - Can Faraway Trees lead out of the Township entirely?
  - Who/what determines the destination?
  - Why does the Bottle Tree variant always lead to the Lighthouse?
  - How did Tabitha appear in a hospital outside?
- id: talismans
  name: Talismans
  type: concept
  canon_summary: Rune-inscribed rocks discovered by Boyd in the Talisman Cave that
    repel Creatures within enclosed spaces. They lose power if a door or window is
    opened.
  priority: likely_supported
  open_questions:
  - Who created the Talismans and inscribed the runes?
  - What is the meaning of the rune-like symbols?
  - Why do they only work in enclosed spaces?
- id: from_symbol
  name: The Symbol
  type: concept
  canon_summary: A mysterious symbol associated with the Township that frequently
    appears in Jade's visions, and previously appeared to Christopher before everyone
    in Victor's childhood Town was killed. The symbol formed from roots on the tunnel
    ceiling above Jade in the cavern.
  priority: core_required
  open_questions:
  - What does the Symbol represent or signify?
  - Why does it appear to specific people (Christopher, Jade)?
  - Why does obsession with it precede calamity?
  - How is it connected to the roots of the Farway Trees?
- id: creatures
  name: The Creatures
  type: entity
  canon_summary: Humanoid monsters that hunt at night, with hypnotic abilities, intimate
    knowledge of inhabitants' lives, and the habit of eviscerating victims. They sleep
    in the Tunnels during the day and wear human stereotype clothing.
  priority: core_required
  open_questions:
  - What are the Creatures and where do they come from?
  - How do they know every inhabitant's name and history?
  - What do they do with the organs they remove?
  - Are they connected to the Man in Yellow?
- id: music_box_monster
  name: Music Box Monster
  type: entity
  canon_summary: A malevolent entity linked to an aged music box with a spinning ballerina,
    dwelling in a Dungeon in the forest. It plagues victims with visions, can render
    them catatonic, and kills in their sleep.
  priority: likely_supported
  open_questions:
  - What is the Music Box Monster's true form and origin?
  - How is it related to the Man in Yellow or other Township forces?
  - Who is Martin and how did he end up shackled in the Dungeon?
  - Why does Boyd's worm-infection link to this monster?
- id: lighthouse
  name: The Lighthouse
  type: concept
  canon_summary: Also known as the Tower, located deep in the Forest and accessible
    via the unique Bottle Tree. Miranda believed it held the key to freeing the children
    and escaping the Township. Tabitha's visions feature its stairs.
  priority: core_required
  open_questions:
  - What is inside the Lighthouse?
  - Why is a lighthouse located far from any water?
  - How does it relate to freeing the Ghoulish Children?
  - Why have all those chosen to reach it (including Miranda) failed?
- id: victor
  name: Victor Kavanaugh
  type: entity
  canon_summary: The longest-surviving person in the Township, trapped since 1978
    as a child with his mother Miranda and sister Eloise. He witnessed the Boy in
    White's interactions with Christopher and survived a mass killing of all other
    inhabitants in his childhood.
  priority: core_required
  open_questions:
  - Why has Victor survived so long when others die?
  - What is the full content of memories he has blocked out?
  - How does his unique knowledge connect to escape?
- id: tabitha
  name: Tabitha Matthews
  type: entity
  canon_summary: Wife of Jim and mother of Julie, Ethan, and deceased Thomas. Her
    childhood featured recurring nightmares of a Settlement with Totems. She is connected
    to the Ghoulish Children and her digging in the basement was warned against by
    the Man in Yellow.
  priority: core_required
  open_questions:
  - Why did Tabitha have Township-related nightmares as a child?
  - What is her role in freeing the Ghoulish Children?
  - How did she end up in an outside hospital via a Faraway Tree?
  - Is she one of the 'chosen' like Miranda?
- id: miranda
  name: Miranda Kavanaugh
  type: entity
  canon_summary: Mother of Victor and Eloise, an artist from Camden, Maine who began
    having Township visions after taking acid by her Bottle Tree art installation.
    She became trapped in 1978 and died near a Bottle Tree trying to reach the Lighthouse
    to 'free the children'.
  priority: likely_supported
  open_questions:
  - Why was Miranda 'chosen' to free the children?
  - Who were the others chosen before her who failed?
  - How did acid trigger her visions of the Township?
  - What is the significance of her Maine Bottle Tree installations?
- id: fatima_baby
  name: Fatima Hassan / unborn child
  type: entity
  canon_summary: Resident of Colony House from Iran, married to Ellis Stevens. Became
    trapped on February 28, 2021 while driving from Boulder to Portland. She serves
    as Julie's proxy when the Matthews arrive.
  priority: may_remain_ambiguous
  open_questions:
  - What is the significance of her unborn child?
  - Does her pregnancy connect to Township supernatural forces?
- id: boyd
  name: Boyd Stevens
  type: entity
  canon_summary: Sheriff and de-facto Mayor of the Town, Iraq War veteran specializing
    in logistics. He discovered the Talismans in the Talisman Cave, and was transported
    via Faraway Tree to the Music Box Monster's Dungeon, where Martin infected him
    with worms via blood.
  priority: core_required
  open_questions:
  - What is the nature of the worms inside Boyd?
  - What was Abby's connection to it 'all being a dream'?
  - Why have the Creatures targeted Boyd specifically to break?
- id: jade
  name: Jade Herrera
  type: entity
  canon_summary: Wealthy software developer who arrived in Town the same day as the
    Matthews. He repeatedly sees visions of the Symbol, including in the Root Cellar,
    on trees with Civil War corpses, and in the caves where roots formed the Symbol
    on the tunnel ceiling.
  priority: core_required
  open_questions:
  - Why is Jade chosen to see the Symbol like Christopher was?
  - What is the significance of his Civil War soldier visions?
  - What melody at the Bottle Tree did Jade play that summoned the Man in Yellow?
  - Is Jade in danger of the same fate as Christopher?
